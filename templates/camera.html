{% extends "base.html" %}

{% block content %}

<section class="page-header">
    <p class="tag">Camera Recognition</p>
    <h1>攝影機辨識頁面</h1>
    <p>
        此頁面為前端靜態畫面，依照 AI 回傳資料中的 name 與 vip 欄位顯示會員身分。
    </p>
</section>

<section class="camera-layout">

    <div class="camera-preview">
        <div class="camera-placeholder">
            攝影機畫面預覽區
        </div>

        <div class="camera-actions">
            <button class="primary-btn">開啟攝影機</button>
            <button class="secondary-btn">偵測人臉</button>
        </div>
    </div>

    <div class="recognition-panel">
        <h2>辨識結果</h2>

        <div class="result-card">
            <p class="result-label">name</p>
            <p class="result-value">王小明</p>
        </div>

        <div class="result-card">
            <p class="result-label">vip</p>
            <p class="result-value">true</p>
        </div>

        <div class="member-display vip-member">
            王小明 VIP會員
        </div>

        <div class="rule-note">
            <p>顯示規則：</p>
            <p>vip = true：顯示「姓名 + VIP會員」</p>
            <p>vip = false：顯示「訪客」</p>
        </div>
    </div>

</section>

{% endblock %}
