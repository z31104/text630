<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}智慧會員辨識系統{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="{% block body_class %}{% endblock %}">

    <header class="navbar">
        <a class="logo" href="{{ url_for('home.home') }}">
            智慧會員系統
        </a>

        <nav class="nav-links" aria-label="主要導覽">
            <a href="{{ url_for('home.home') }}" {% if request.endpoint == "home.home" %}aria-current="page"{% endif %}>首頁</a>
            <a href="{{ url_for('home.dashboard') }}" {% if request.endpoint == "home.dashboard" %}aria-current="page"{% endif %}>Dashboard</a>
            <a href="{{ url_for('camera.camera') }}" {% if request.endpoint == "camera.camera" %}aria-current="page"{% endif %}>Camera</a>
            <a href="{{ url_for('member.member') }}" {% if request.endpoint and request.endpoint.startswith("member.") %}aria-current="page"{% endif %}>會員管理</a>
        </nav>
    </header>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    {% block scripts %}
    {% endblock %}

</body>
</html>
